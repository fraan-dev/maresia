<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maresia</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f9fc;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 {
            color: #083f4d;
            margin-bottom: 8px;
        }
        .login-card p {
            color: #666;
            margin-bottom: 24px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #087d91;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-card button:hover {
            background: #065f6e;
        }
        .error {
            color: #e74c3c;
            background: #fde8e8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>🏛️ Maresia</h1>
            <p>Painel do Gestor - Faça login para continuar</p>
            
            <div class="error" id="errorMsg">❌ Email ou senha incorretos</div>
            
            <input type="email" id="email" placeholder="Email" value="admin@maresia.com">
            <input type="password" id="senha" placeholder="Senha" value="admin123">
            <button onclick="fazerLogin()">Entrar →</button>
            
            <p style="text-align: center; margin-top: 16px; font-size: 14px; color: #999;">
                Usuário: admin@maresia.com<br>
                Senha: admin123
            </p>
        </div>
    </div>

    <script>
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const error = document.getElementById('errorMsg');

            try {
                // Buscar todos os usuários da API (ou você pode criar um endpoint /login)
                const response = await fetch('/api/usuarios');
                const usuarios = await response.json();
                
                const usuario = usuarios.find(u => u.email === email && u.senha === senha);
                
                if (usuario && usuario.admin === true) {
                    // Salva na sessão
                    sessionStorage.setItem('usuarioLogado', JSON.stringify(usuario));
                    window.location.href = '/admin.html';
                } else {
                    error.style.display = 'block';
                }
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                error.textContent = '❌ Erro ao conectar com o servidor';
                error.style.display = 'block';
            }
        }

        // Enter para enviar
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') fazerLogin();
        });
    </script>
</body>
</html>
