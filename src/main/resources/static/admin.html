<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - MaresIA</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0f4f8;
            color: #1a2a33;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .admin-header {
            background: #083f4d;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .admin-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-header .brand .icon {
            font-size: 28px;
        }

        .admin-header .brand h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .admin-header .brand small {
            display: block;
            font-size: 12px;
            opacity: 0.7;
            font-weight: 400;
        }

        .admin-header .user-area {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .admin-header .user-area .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px 6px 12px;
            border-radius: 30px;
            font-size: 14px;
        }

        .admin-header .user-area .user-info .badge {
            background: #27ae60;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .admin-header .user-area a {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .admin-header .user-area a:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .admin-header .user-area .btn-sair {
            background: rgba(231, 76, 60, 0.3);
        }

        .admin-header .user-area .btn-sair:hover {
            background: rgba(231, 76, 60, 0.5);
        }

        /* ===== CONTAINER ===== */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ===== ESTATÍSTICAS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 20px 24px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 800;
            color: #083f4d;
            line-height: 1.2;
        }

        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .stat-card.pending .number {
            color: #e74c3c;
        }
        .stat-card.resolved .number {
            color: #27ae60;
        }
        .stat-card.today .number {
            color: #f39c12;
        }

        /* ===== FILTROS ===== */
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: white;
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
            align-items: center;
        }

        .filters select,
        .filters input {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            background: white;
            min-width: 140px;
            transition: border-color 0.3s;
        }

        .filters select:focus,
        .filters input:focus {
            outline: none;
            border-color: #087d91;
        }

        .filters .btn-filter {
            padding: 10px 24px;
            background: #087d91;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.3s;
        }

        .filters .btn-filter:hover {
            background: #065f6e;
        }

        .filters .btn-clear {
            padding: 10px 20px;
            background: #e8edf2;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .filters .btn-clear:hover {
            background: #d5dce3;
        }

        /* ===== TABELA ===== */
        .table-wrapper {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
            padding: 0 0 4px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 700px;
        }

        thead {
            background: #f8fafc;
            border-bottom: 2px solid #e8edf2;
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        tr:hover td {
            background: #f8fafc;
        }

        /* ===== BADGES ===== */
        .status-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-badge.pending {
            background: #fde8e8;
            color: #c0392b;
        }

        .status-badge.resolved {
            background: #e8f8f5;
            color: #1a7a4a;
        }

        /* ===== FOTO MINIATURA ===== */
        .photo-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 8px;
            background: #f0f0f0;
            display: block;
        }

        .photo-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #e8edf2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #999;
        }

        /* ===== BOTÕES DE AÇÃO ===== */
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            margin: 0 3px;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .action-btn.view {
            background: #3498db;
            color: white;
        }
        .action-btn.view:hover {
            background: #2980b9;
        }

        .action-btn.resolve {
            background: #27ae60;
            color: white;
        }
        .action-btn.resolve:hover {
            background: #1e8449;
        }

        .action-btn.delete {
            background: #e74c3c;
            color: white;
        }
        .action-btn.delete:hover {
            background: #c0392b;
        }

        /* ===== ESTADO VAZIO ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            color: #555;
            font-size: 18px;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .admin-header {
                padding: 12px 16px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .admin-header .user-area {
                justify-content: space-between;
            }

            .admin-header .brand h1 {
                font-size: 17px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card .number {
                font-size: 28px;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filters select,
            .filters input,
            .filters .btn-filter,
            .filters .btn-clear {
                width: 100%;
                min-width: unset;
            }

            .admin-container {
                padding: 12px;
            }

            table {
                font-size: 12px;
                min-width: 600px;
            }

            th,
            td {
                padding: 10px 12px;
            }

            .action-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-card {
                padding: 14px 12px;
            }

            .stat-card .number {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- HEADER -->
    <!-- ============================================================ -->
    <header class="admin-header">
        <div class="brand">
            <span class="icon">≈</span>
            <div>
                <h1>MaresIA</h1>
                <small>Painel do Gestor Ambiental</small>
            </div>
        </div>
        <div class="user-area">
            <div class="user-info">
                <span>👤 <span id="userName">Administrador</span></span>
                <span class="badge">Admin</span>
            </div>
            <a href="/" target="_blank">🌍 Ver mapa</a>
            <a href="/login.html" class="btn-sair" onclick="logout()">🚪 Sair</a>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- CONTEÚDO -->
    <!-- ============================================================ -->
    <div class="admin-container">

        <!-- ESTATÍSTICAS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="totalCount">0</div>
                <div class="label">📋 Total de denúncias</div>
            </div>
            <div class="stat-card pending">
                <div class="number" id="pendingCount">0</div>
                <div class="label">🔴 Pendentes</div>
            </div>
            <div class="stat-card resolved">
                <div class="number" id="resolvedCount">0</div>
                <div class="label">🟢 Resolvidas</div>
            </div>
            <div class="stat-card today">
                <div class="number" id="todayCount">0</div>
                <div class="label">📅 Hoje</div>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="filters">
            <select id="statusFilter" onchange="loadReports()">
                <option value="all">📊 Todos os status</option>
                <option value="pending">🔴 Pendentes</option>
                <option value="resolved">🟢 Resolvidos</option>
            </select>

            <select id="typeFilter" onchange="loadReports()">
                <option value="all">🗑️ Todos os tipos</option>
                <option value="Plástico">Plástico</option>
                <option value="Metal">Metal</option>
                <option value="Vidro">Vidro</option>
                <option value="Rede de pesca">Rede de pesca</option>
                <option value="Resíduo orgânico">Resíduo orgânico</option>
                <option value="Outro">Outro</option>
            </select>

            <input type="date" id="dateFilter" onchange="loadReports()">

            <button class="btn-filter" onclick="loadReports()">🔄 Atualizar</button>
            <button class="btn-clear" onclick="limparFiltros()">✕ Limpar</button>
        </div>

        <!-- TABELA -->
        <div class="table-wrapper">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>📷</th>
                            <th>🗑️ Tipo</th>
                            <th>💬 Comentário</th>
                            <th>📍 Localização</th>
                            <th>📅 Data</th>
                            <th>📊 Status</th>
                            <th>⚙️ Ações</th>
                        </tr>
                    </thead>
                    <tbody id="reportsTableBody">
                        <tr>
                            <td colspan="7" class="empty-state">
                                <span class="emoji">⏳</span>
                                <h3>Carregando denúncias...</h3>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================================ -->
    <script>
        // =============================================================
        // VERIFICAÇÃO DE LOGIN
        // =============================================================
        const usuarioLogado = sessionStorage.getItem('usuarioLogado');

        if (!usuarioLogado) {
            window.location.href = '/login.html';
        } else {
            try {
                const user = JSON.parse(usuarioLogado);
                document.getElementById('userName').textContent = user.nome || 'Administrador';
            } catch {
                window.location.href = '/login.html';
            }
        }

        function logout() {
            sessionStorage.removeItem('usuarioLogado');
            window.location.href = '/login.html';
        }

        // =============================================================
        // LIMPAR FILTROS
        // =============================================================
        function limparFiltros() {
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('dateFilter').value = '';
            loadReports();
        }

        // =============================================================
        // CARREGAR DENÚNCIAS
        // =============================================================
        async function loadReports() {
            const statusFilter = document.getElementById('statusFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            const tbody = document.getElementById('reportsTableBody');

            try {
                const response = await fetch('/api/reports');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const reports = await response.json();

                // Aplica filtros
                let filtered = reports;

                if (statusFilter !== 'all') {
                    filtered = filtered.filter(r => r.status === statusFilter);
                }

                if (typeFilter !== 'all') {
                    filtered = filtered.filter(r => r.type === typeFilter);
                }

                if (dateFilter) {
                    const dateObj = new Date(dateFilter);
                    const dateStr = dateObj.toDateString();
                    filtered = filtered.filter(r => {
                        const rDate = new Date(r.createdAt);
                        return rDate.toDateString() === dateStr;
                    });
                }

                // =============================================================
                // ATUALIZA ESTATÍSTICAS
                // =============================================================
                const total = reports.length;
                const pendentes = reports.filter(r => r.status === 'pending').length;
                const resolvidos = reports.filter(r => r.status === 'resolved').length;
                const hoje = reports.filter(r => {
                    const hojeStr = new Date().toDateString();
                    return new Date(r.createdAt).toDateString() === hojeStr;
                }).length;

                document.getElementById('totalCount').textContent = total;
                document.getElementById('pendingCount').textContent = pendentes;
                document.getElementById('resolvedCount').textContent = resolvidos;
                document.getElementById('todayCount').textContent = hoje;

                // =============================================================
                // RENDERIZA TABELA
                // =============================================================
                if (filtered.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="empty-state">
                                <span class="emoji">📭</span>
                                <h3>Nenhuma denúncia encontrada</h3>
                                <p style="color:#999;font-size:14px;margin-top:4px;">Tente ajustar os filtros ou criar uma nova denúncia.</p>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = filtered.map(r => {
                    const isPending = r.status === 'pending';
                    const statusLabel = isPending ? '🔴 Pendente' : '🟢 Resolvido';
                    const statusClass = isPending ? 'pending' : 'resolved';
                    const resolveLabel = isPending ? '✅ Resolver' : '↩️ Reabrir';

                    const photoHtml = r.photo ?
                        `<img src="${r.photo}" alt="Foto" class="photo-thumb" onerror="this.style.display='none'">` :
                        `<div class="photo-placeholder">📷</div>`;

                    const dateFormatted = new Date(r.createdAt).toLocaleString('pt-BR', {
                        dateStyle: 'short',
                        timeStyle: 'short'
                    });

                    return `
                        <tr>
                            <td>${photoHtml}</td>
                            <td><strong>${r.type || 'Não classificado'}</strong></td>
                            <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
                                "${r.comment || 'Sem comentário'}"
                            </td>
                            <td style="font-size:12px;color:#666;">
                                ${r.lat?.toFixed(6)}, ${r.lng?.toFixed(6)}
                            </td>
                            <td style="font-size:13px;white-space:nowrap;">${dateFormatted}</td>
                            <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                            <td style="white-space:nowrap;">
                                <button class="action-btn view" onclick="window.open('/?view=${r.id}','_blank')" title="Ver no mapa">👁️</button>
                                <button class="action-btn resolve" onclick="toggleStatus('${r.id}')" title="${resolveLabel}">${resolveLabel}</button>
                                <button class="action-btn delete" onclick="deleteReport('${r.id}')" title="Excluir">🗑️</button>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error('Erro ao carregar denúncias:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <span class="emoji">❌</span>
                            <h3>Erro ao carregar denúncias</h3>
                            <p style="color:#e74c3c;font-size:14px;">${error.message}</p>
                            <button onclick="loadReports()" style="margin-top:12px;padding:8px 20px;background:#087d91;color:white;border:none;border-radius:8px;cursor:pointer;">Tentar novamente</button>
                        </td>
                    </tr>
                `;
            }
        }

        // =============================================================
        // ALTERNAR STATUS (PENDENTE <-> RESOLVIDO)
        // =============================================================
        async function toggleStatus(id) {
            try {
                const response = await fetch(`/api/reports/${id}`);

                if (!response.ok) {
                    throw new Error(`Denúncia não encontrada (${response.status})`);
                }

                const report = await response.json();

                // Alterna o status
                const newStatus = report.status === 'pending' ? 'resolved' : 'pending';
                report.status = newStatus;
                report.updatedAt = new Date().toISOString();

                const updateResponse = await fetch(`/api/reports/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(report)
                });

                if (!updateResponse.ok) {
                    throw new Error(`Erro ao atualizar (${updateResponse.status})`);
                }

                // Recarrega a lista
                await loadReports();

                // Feedback visual
                const msg = newStatus === 'resolved' ? '✅ Denúncia marcada como resolvida!' : '🔄 Denúncia reaberta!';
                alert(msg);

            } catch (error) {
                console.error('Erro ao alternar status:', error);
                alert('❌ Erro ao atualizar status: ' + error.message);
            }
        }

        // =============================================================
        // EXCLUIR DENÚNCIA
        // =============================================================
        async function deleteReport(id) {
            if (!confirm('⚠️ Tem certeza que deseja excluir esta denúncia permanentemente?')) {
                return;
            }

            try {
                const response = await fetch(`/api/reports/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error(`Erro ao excluir (${response.status})`);
                }

                await loadReports();
                alert('🗑️ Denúncia excluída com sucesso!');

            } catch (error) {
                console.error('Erro ao excluir:', error);
                alert('❌ Erro ao excluir denúncia: ' + error.message);
            }
        }

        // =============================================================
        // CARREGA AUTOMATICAMENTE AO INICIAR
        // =============================================================
        loadReports();

        // Atualiza a cada 30 segundos
        setInterval(loadReports, 30000);
    </script>

</body>
</html>
